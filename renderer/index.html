<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Desktop</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-left">
      <img src="../assets/icon.png" id="app-icon-img" alt="H">
      <span id="app-title">Hermes Desktop</span>
      <span id="app-version"></span>
    </div>
    <div id="titlebar-right">
      <select id="model-select" class="model-select" title="Switch model/provider">
        <option value="longcat">LongCat</option>
        <option value="openrouter">OpenRouter</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="nous">Nous</option>
      </select>
      <button id="theme-btn" class="btn-icon" title="Toggle theme">&#9788;</button>
      <span id="status-indicator" class="status-offline"></span>
      <span id="status-text">Offline</span>
    </div>
  </div>

  <div id="terminal-container"></div>

  <script src="app.js"></script>
</body>
</html>
